<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula OS</title>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(155, 155, 155);
        }
        .phoneBody {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 30%;
            height: 90%;
            overflow: visible;
            filter: drop-shadow(black 30px 30px 50px);
            transition: all 1.5s;
        }
        .phoneBorder {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-color: black;
            border-radius: 20px;
        }
        .phoneScreen {
            position: absolute;
            width: 98%;
            height: 98.5%;
            background-color: black;
            border-radius: 15px;
            overflow: hidden;
        }
        .powerBTNHit {
            position: absolute;
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: -1;
            width: 15%;
            height: 15%;
            right: -15%;
            top: 10%;
        }
        .powerBTNClick {
            position: absolute;
            width: 8%;
            height: 60%;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            color: transparent;
            background-color: black;
        }

        .louderBTNHit {
            position: absolute;
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: -1;
            width: 15%;
            height: 15%;
            left: -15%;
            top: 10%;
        }
        .louderBTNClick {
            position: absolute;
            width: 8%;
            height: 60%;
            right: 0;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            color: transparent;
            background-color: black;
        }

        .quietBTNHit {
            position: absolute;
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: -1;
            width: 15%;
            height: 15%;
            left: -15%;
            top: 25%;
        }
        .quietBTNClick {
            position: absolute;
            width: 8%;
            height: 60%;
            right: 0;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            color: transparent;
            background-color: black;
        }

        .VolumeCont {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translateX(-50%) translateY(-200%);
            left: 50%;
            top: 1%;
            width: 50%;
            height: 8%;
            background-color: rgba(121, 121, 121, 0.7);
            border-radius: 10px;
            z-index: 100;
        }
        .Volume {
            position: absolute;
            display: flex;
            justify-content: start;
            width: 70%;
            height: 8px;
            border-radius: 20px;
            background-color: gray;
        }
        .VolumeValue {
            position: absolute;
            transition: all 0.05s;
            height: 100%;
            width: 50%;
            border-radius: 20px;
            background-color: white;
        }

        .welcomeScreen {
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
            background-color: #797979;
            width: 100%;
            height: 100%;
        }
        .WelcomeText {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transition: all 2s linear;
            background-color: #292929;
            width: 0%;
            height: 0%;
            border-radius: 10px;
        }
        .WelInText {
            position: absolute;
            color: white;
            transition: all 4s;
            opacity: 0;
        }

        .LockScreen {
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-image: url('Lockscreen.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            transition: all 0.5s;
            cursor: pointer;
        }

        .PhoneCur {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            background-color: rgba(121, 121, 121, 0.7);
            top: 10%;
            width: 50%;
            height: 20%;
            border-radius: 10px;
        }
        .PhoneTime {
            padding: 0;
            margin: 0;
        }
        .HomeScreen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            color: white;
            transition: transform 0.3s ease;
            background-image: url('Homescreen.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        .AppCont {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .AppCont {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(5, auto);
            }
        }

        @media (max-width: 480px) {
            .AppCont {
                grid-template-columns: 1fr; 
                grid-template-rows: repeat(5, auto);
            }
        }
        .AppHit {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 85px;
            height: 85px;
            background-color: transparent;
            border-radius: 10px;
            cursor: pointer;
        }
        .AppIcon {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            top: 0px;
            object-fit: contain;
        }
        .AppTitle {
            position: relative;
            bottom: 0px;
            margin: 0%;
            padding: 0%;
            filter: drop-shadow(black 2px 2px 2px);
        }
        .grid-container {
            position: absolute;
            display: grid;
            justify-items: center;
            align-items: center;
            width: 100%;
            height: 100%;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            background-color: transparent;
        }
        .GridAppSlot {
            display: flex;
            justify-content: center;
            align-items: end;
        }

        .AppList {
            position: absolute;
            display: flex;
            justify-items: center;
            align-items: center;
            flex-direction: column;
            opacity: 0%;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            gap: 20px;
            z-index: 90;
            background: rgba(65, 65, 65, 0.8);
            backdrop-filter: saturate(180%) blur(10px);
            transition: all 0.25s;
        }
        .AppOpenedPlace {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            cursor: pointer;
            gap: 15px;
            width: 80%;
            height: 10%;
            border-radius: 10px;
            background: rgba(126, 126, 126, 0.8);
            transition: all 0.25s;
        }
        .AppOpenedIcon {
            position: absolute;
            width: 5vh;
            height: 5vh;
            border-radius: 10px;
            left: 5px;
        }
        .AppOpTitle {
            position: absolute;
            left: 100px;
            margin: 0%;
            padding: 0%;
            color: white;
        }
        .CloseApp {
            position: absolute;
            width: 5vh;
            height: 5vh;
            border-radius: 10px;
            right: 5px;
            background-color: red;
            color: white;
            cursor: pointer;
        }
        .CloseX {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .CloseA {
            position: absolute;
        }
        .OpenHitbox {
            position: absolute;
            height: 100%;
            width: 80%;
            left: 0;
        }
        .CloseHitbox {
            position: absolute;
            height: 100%;
            width: 20%;
            right: 0;
        }
        

        .AppPage {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(5, 1fr);
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            justify-items: center;
            align-items: center;
            transition: transform 0.3s ease;
            background-color: transparent;
        }
        .TimeWidget {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 15px;
        }

        .installedApp {
            display: none;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-color: white;
            z-index: -3;
            flex-direction: column;
        }
        .browser {
            width: 100%;
            height: 100%;
            background-color: red;
            border-radius: 10px;
        }

        .ControlBar {
            position: absolute;
            display: none;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 8%;
            bottom: 0;
            background-color: rgba(97, 97, 97, 0.7);
            z-index: 110;
        }
        .HomeBTN, .OpenedAppsBTN, .openMenuBTN {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            color: white;
            background-color: #292929;
            margin: 0%;
            padding: 0%;
            cursor: pointer;
            text-size-adjust: 200%;
            transition: all 0.25s;
            box-shadow: black 4px 4px 4px;
        }
        .OpenedAppsBTN {
            left: 25%;
            transform: translateX(-50%);
        }
        .openMenuBTN {
            right: 25%;
            transform: translateX(50%);
        }
        .Icon {
            width: 50%;
            height: 50%;
            filter: invert(1);
        }
        .HomeIcon {
            width: 60%;
            height: 60%;
        }

        .navbar {
            position: absolute;
            display: none;
            justify-content: end;
            align-items: center;
            color: white;
            width: 100%;
            height: 2.5%;
        }
        .navTime {
            filter: drop-shadow(black 2px 2px 2px);
            padding-right: 10px;
        }

        .MenuFunc {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translateY(500%) translateX(-50%);
            transition: all 0.5s;
            left: 50%;
            top: 50%;
            width: 15vh;
            height: 15vh;
            border-radius: 50%;
            background-color: #292929;
        }
        .MenuFuncSpace {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 15%;
            height: 15%;
        }
        .MenuFuncVis {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 15vh;
            height: 15vh;
            border-radius: 50%;
            cursor: pointer;
            background-color: #292929;
            transition: all 0.25s;
            filter: drop-shadow(black 8px 8px 8px);
        }
        .FuncSpace {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            width: 5vh;
            height: 5vh;
            border-radius: 50%;
            z-index: -1;
            color: white;
            transition: all 0.25s;
            filter: drop-shadow(black 4px 4px 4px);
        }
        .Func {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }
        .InterIcon {
            position: absolute;
            width: 50%;
            height: 50%;
            filter: invert(100%);
        }
        .pl {
            margin: auto;
            position: relative;
            width: 8em;
            height: 8em;
        }
        .pl:before,.pl:after {
            animation: pl-before 2.5s cubic-bezier(0.65, 0, 0.35, 1) infinite;
            background-color: currentColor;
            content: "";
            display: block;
            position: absolute;
            top: 75%;
            left: 50%;
            width: 25%;
            height: 25%;
            transform-origin: 100% 100%;
        }
        .pl:after {
            animation-name: pl-after;
        }
        @keyframes pl-before {
            from {
                transform: rotate(0) translate(-100%, -100%) rotate(-90deg);
            }
            20% {
                transform: rotate(0) translate(-100%, -100%) rotate(90deg);
            }
            40% {
                transform: rotate(0) translate(-300%, -100%) rotate(90deg);
            }
            60% {
                transform: rotate(90deg) translate(-300%, -100%) rotate(-90deg);
            }
            80% {
                transform: rotate(90deg) translate(-100%, -100%) rotate(-90deg);
            }
            to {
                transform: rotate(90deg) translate(-100%, 100%) rotate(90deg);
            }
        }
        @keyframes pl-after {
            from,20% {
                transform: rotate(0) scale(1, 1);
            }
            40% {
                transform: rotate(0) scale(3, 1);
            }
            60% {
                transform: rotate(90deg) scale(3, 1);
            }
            80% {
                transform: rotate(90deg) scale(1, 1);
            }
            to {
                transform: rotate(90deg) scale(1, 1) translate(0, 200%);
            }
        }


        #SettingsApp {
            background-color: gray;
        }
        .loader7{
            position: relative;
            width: 40px;
            height: 40px;
            top: 40%;
            top: -webkit-calc(50% - 20px);
            top: calc(50% - 20px);
            left: 43%;
            left: -webkit-calc(50% - 20px);
            left: calc(50% - 20px);
            background-color: #ffffff33;
        }
        .loader7:before{
            content: "";
            position: absolute;
            background-color: #fff;
            height: 10px;
            width: 10px;
            border-radius: 10px;
            -webkit-animation: loader7 2s ease-in-out infinite;
            animation: loader7 2s ease-in-out infinite;
        }
        .loader7:after{
            content: "";
            position: absolute;
            background-color: #fff;
            top: 0px;
            left: 0px;
            height: 40px;
            width: 0px;
            z-index: 0;
            opacity: 1;
            -webkit-animation: loader72 10s ease-in-out infinite;
            animation: loader72 10s ease-in-out infinite;
        }
        @-webkit-keyframes loader7{
            0%{left: -12px; top: -12px;}
            25%{left:42px; top:-12px;}
            50%{left: 42px; top: 42px;}
            75%{left: -12px; top: 42px;}
            100%{left:-12px; top:-12px;}
        }
        @keyframes loader7{
            0%{left: -12px; top: -12px;}
            25%{left:42px; top:-12px;}
            50%{left: 42px; top: 42px;}
            75%{left: -12px; top: 42px;}
            100%{left:-12px; top:-12px;}
        }
        @-webkit-keyframes loader72{
            0%{width: 0px;}
            70%{width: 40px; opacity: 1;}
            90%{opacity: 0; width: 40px;}
            100%{opacity: 0;width: 0px;}
        }
        @keyframes loader72{
            0%{width: 0px;}
            70%{width: 40px; opacity: 1;}
            90%{opacity: 0; width: 40px;}
            100%{opacity: 0;width: 0px;}
        }
    </style>
</head>
<body>
    <div class="phoneBody">
        <div class="phoneBorder">
            <div class="phoneScreen">

                <div class="welcomeScreen">
                    <p class="WelcomeText">
                        <h2 class="WelInText">Nebula OS</h2>
                    </p>
                </div>

                <div class="HomeScreen">
                    <div class="AppCont"></div>
                    
                </div>

                <div class="installedApp" id="browserApp">
                    <h1>Browser</h1>
                    <div class="pl"></div>
                </div>

                <div class="installedApp" id="SettingsApp">
                    <h1>Settings</h1>
                    <div class="container">
                        <div class="box">
                            <div class="loader7"></div>
                        </div>
                    </div>
                </div>

                <div class="ControlBar">
                    <h1 class="HomeBTN" onclick="HomePage()">
                        <svg class="Icon HomeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M464 256A208 208 0 1 0 48 256a208 208 0 1 0 416 0zM0 256a256 256 0 1 1 512 0A256 256 0 1 1 0 256z"/></svg>
                    </h1>
                    <div class="OpenedAppsBTN" onclick="openOpenedAppsList()">
                        <svg class="Icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M432 48L208 48c-17.7 0-32 14.3-32 32l0 16-48 0 0-16c0-44.2 35.8-80 80-80L432 0c44.2 0 80 35.8 80 80l0 224c0 44.2-35.8 80-80 80l-16 0 0-48 16 0c17.7 0 32-14.3 32-32l0-224c0-17.7-14.3-32-32-32zM48 448c0 8.8 7.2 16 16 16l256 0c8.8 0 16-7.2 16-16l0-192L48 256l0 192zM64 128l256 0c35.3 0 64 28.7 64 64l0 256c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 192c0-35.3 28.7-64 64-64z"/></svg>
                    </div>
                    <div class="openMenuBTN" onclick="openMenuFunc()">
                        <svg class="Icon MenuIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M0 96C0 78.3 14.3 64 32 64l384 0c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 128C14.3 128 0 113.7 0 96zM0 256c0-17.7 14.3-32 32-32l384 0c17.7 0 32 14.3 32 32s-14.3 32-32 32L32 288c-17.7 0-32-14.3-32-32zM448 416c0 17.7-14.3 32-32 32L32 448c-17.7 0-32-14.3-32-32s14.3-32 32-32l384 0c17.7 0 32 14.3 32 32z"/></svg>
                    </div>
                </div>

                <div class="navbar">
                    <h4 class="PhoneTime navTime">Time</h4>
                </div>

                <div class="LockScreen">
                    <div class="PhoneCur">
                        <h1 class="PhoneTime">Time</h1>
                        <p class="PhoneDate">Date</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="powerBTNHit" onclick="turnPower()">
            <div class="powerBTNClick">.</div>
        </div>

        <div class="louderBTNHit" onclick="turnVolume('louder')">
            <div class="louderBTNClick">.</div>
        </div>

        <div class="quietBTNHit" onclick="turnVolume('quiet')">
            <div class="quietBTNClick">.</div>
        </div>
    </div>

    <script src="node_modules/eruda/eruda.js"></script>
    <script>eruda.init();</script>

    <script>

        const Color = [
        'blue', 'red', 'green', 'lime', 'purple', 'magenta', 'turquoise', 'orange',
        'maroon', 'navy', 'teal', 'aqua', 'fuchsia', 'gold', 'coral',
        'indigo', 'lavender', 'pink', 'salmon', 'violet'
        ];
        let AppIds = [];
        let Apps = [];
        let openedApps = [];
        let Funktionen = [];
        let curOpen = '';
        let isSwiping = false;
        let startX = 0;
        let currentX = 0;
        let WidgetId = 0;
        let CurFuncPage = 1;
        let Volume = 50;
        let BTNCool = 0;
        let VolumeCool = 0;
        let currentPage = 0;
        let power = false;
        let Initialised = false;
        let AppListOpened = false;

        let FuncIds = [];
        let FuncDelay = 100;
        let FuncOpenDelay = 0;
        let FuncExpanded = false;
        let MenuFuncOpened = false;
        let AlreadyTurned = false;

        function getRandomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        const numRows = 5;
        const numCols = 3;
        const appsPerPage = 15;


        function createGridContainer() {
            const gridContainer = document.createElement('div');
            gridContainer.classList.add('grid-container');
            let GridSlotId = 1;

            for (let row = 0; row < numRows; row++) {
                for (let col = 0; col < numCols; col++) {
                    const gridItem = document.createElement('div');
                    gridItem.classList.add('GridAppSlot');
                    gridItem.classList.add(`GridSlot${GridSlotId}`);
                    gridItem.dataset.gridId = row * numCols + col + 1;
                    gridContainer.appendChild(gridItem);
                    GridSlotId++;
                }
            }

            return gridContainer;
        }

        for (let i = 0; i <= 6; i++) {
            if (i != 5) {
                createApp(i, `App${i}`, { title: '', Icon: "", color: Color[getRandomNumber(0, 19)], OpenId: "", special: 'Space', id: '', width: '', height: '' });
            } else if (i == 5) {
                createApp(5, '', { title: '', Icon: '', color: 'rgba(121, 121, 121, 0.7)', OpenId: "", special: 'Placeholder', id: 'TimeWidget', width: '70%', height: '25vh' });
            }
        }

        createApp(7, 'browserApp', { title: 'Browser', Icon: "AppIcons/Browser.png", color: Color[getRandomNumber(0, 19)], OpenId: "browserApp", special: '', id: '', width: '', height: '' });
        createApp(8, 'SettingsApp', { title: 'Settings', Icon: "AppIcons/Settings.png", color: Color[getRandomNumber(0, 19)], OpenId: "SettingsApp", special: '', id: '', width: '', height: '' });

        //createApp(17, 'browserApp', { title: 'Browser', Icon: "AppIcons/Browser.png", color: Color[getRandomNumber(0, 19)], OpenId: "browserApp", special: '', id: '', width: '', height: '' });

        function createApp(AppId, Class, data) {
            if (!AppIds.includes(AppId)) {
                const AppCont = document.querySelector('.AppCont');
                Apps.push({ id: Class, datas: [data] });
                AppIds.push(AppId);

                let CurAppId = parseInt(AppId);
                let CurApp = Apps.find(app => app.id === Class);

                let AppPage;
                let newGridContainer = createGridContainer();

                if (Apps.length % appsPerPage === 1 || !Initialised) {
                    AppPage = document.createElement('div');
                    AppPage.classList.add('AppPage');
                    AppCont.appendChild(AppPage);
                    AppPage.appendChild(newGridContainer);
                    Initialised = true;
                } else {
                    AppPage = AppCont.lastChild;
                    if (!AppPage.querySelector('.grid-container')) {
                        AppPage.appendChild(newGridContainer);
                    } else {
                        newGridContainer = AppPage.querySelector('.grid-container');
                    }
                }

                let AppGrid = AppPage.querySelector(`.GridSlot${AppId % appsPerPage === 0 ? appsPerPage : AppId % appsPerPage}`);
                if (!AppGrid) {
                    console.error(`Grid item with ID ${AppId} not found.`);
                    return;
                }

                const AppHit = document.createElement('div');
                AppHit.classList.add('AppHit');
                AppHit.classList.add('Hitbox');
                AppGrid.appendChild(AppHit);

                const App = document.createElement('img');
                App.classList.add('AppIcon');
                AppHit.appendChild(App);

                const AppTitle = document.createElement('h4');
                AppTitle.classList.add('AppTitle');
                AppHit.appendChild(AppTitle);

                CurApp.datas.forEach(data => {
                    if (data.title != '' && data.special == '') {
                        AppTitle.innerHTML = data.title;
                        App.src = data.Icon;
                        App.alt = data.title;
                        //AppHit.style.backgroundColor = data.color;
                        AppHit.onclick = function () { openApp(data.OpenId); };
                    }

                    if (data.special == 'Placeholder' && data.OpenId == '') {
                        App.style.display = 'none';

                        WidgetId++;
                        const PlaceApp = document.createElement('div');
                        PlaceApp.classList.add(`Widget${WidgetId}`);
                        PlaceApp.classList.add(data.id);
                        PlaceApp.style.width = data.width;
                        PlaceApp.style.height = data.height;
                        PlaceApp.style.backgroundColor = data.color;
                        AppGrid.appendChild(PlaceApp);

        const AppContainer = document.querySelector('.AppCont');
        let startY = 0;
        let currentY = 0;

        AppContainer.addEventListener('touchstart', startSwipe);
        AppContainer.addEventListener('touchmove', moveSwipe);
        AppContainer.addEventListener('touchend', endSwipe);
        AppContainer.addEventListener('touchcancel', endSwipe);

        AppContainer.addEventListener('mousedown', startSwipe);
        AppContainer.addEventListener('mousemove', moveSwipe);
        AppContainer.addEventListener('mouseup', endSwipe);
        AppContainer.addEventListener('mouseleave', endSwipe);

        function startSwipe(e) {
            isSwiping = true;
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        }

        function moveSwipe(e) {
            if (isSwiping) {
                currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                const deltaX = currentX - startX;
                AppContainer.style.transform = `translateX(calc(-${currentPage * 100}% + ${deltaX}px))`;
            }
        }

        function endSwipe() {
            if (isSwiping) {
                const deltaX = currentX - startX;
                const deltaY = currentY - startY;

                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (deltaX < -50) {
                        changePage(1);
                    } else if (deltaX > 50) {
                        changePage(-1);
                    } else {
                        AppContainer.style.transform = `translateX(-${currentPage * 100}%)`;
                    }
                } else {
                    if (AlreadyTurned) {
                        if (deltaY > 50) {
                            changePage(1); 
                        } else if (deltaY < -50) {
                            changePage(-1); 
                        }
                    }
                }

                isSwiping = false;
            }
        }

        function changePage(direction) {
            const pages = AppContainer.children.length;
            const newPage = currentPage + direction;

            if (newPage >= 0 && newPage < pages) {
                currentPage = newPage;
                AppContainer.style.transform = `translateX(-${currentPage * 100}%)`;
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') {
                changePage(1);
            } else if (e.key === 'ArrowLeft') {
                changePage(-1);
            }
        });

        console.log(Funktionen);

        function createMenuFunc(FuncId, data) {
            if (FuncId <= 8) {
                FuncOpenDelay += 0.3;
                Funktionen.push({ id: FuncId, datas: [data] });

                const MenuFuncSpace = document.querySelector('.MenuFuncSpace');

                let CurFuncId = parseInt(FuncId);
                FuncIds.push(CurFuncId);
                let CurFunc = Funktionen.find(func => func.id === CurFuncId);

                const FuncSpace = document.createElement('div');
                FuncSpace.classList.add('FuncSpace');
                FuncSpace.classList.add(`FuncSpace${FuncId}`);
                FuncSpace.classList.add(`FuncSpacePage${CurFuncPage}`);
                FuncSpace.style.transition = `all 0.3s`;
                MenuFuncSpace.appendChild(FuncSpace);

                const Func = document.createElement('div');
                Func.classList.add('Func');
                Func.classList.add(`Func${FuncId}`);
                Func.style.transition = `all 0.3s`;
                FuncSpace.appendChild(Func);

                CurFunc.datas.forEach(data => {
                    FuncSpace.style.backgroundColor = data.color;
                    Func.innerHTML = data.title;
                    Func.onclick = function () { addFuncToFunc(data.Func); };
                });
                if (FuncId == 8) {
                    FuncOpenDelay == 0;
                }
            } else if (16 >= FuncId && FuncId > 8) {
                if (CurFuncPage == 1) {
                    CurFuncPage++;
                }
                FuncOpenDelay += 0.3;
                Funktionen.push({ id: FuncId, datas: [data] });

                const MenuFuncSpace = document.querySelector('.MenuFuncSpace');

                let CurFuncId = parseInt(FuncId);
                FuncIds.push(CurFuncId);
                let CurFunc = Funktionen.find(func => func.id === CurFuncId);

                const FuncSpace = document.createElement('div');
                FuncSpace.classList.add('FuncSpace');
                FuncSpace.classList.add(`FuncSpace${FuncId}`);
                FuncSpace.classList.add(`FuncSpacePage${CurFuncPage}`);
                FuncSpace.style.display = 'none';
                FuncSpace.style.transition = `all 0.3s`;
                MenuFuncSpace.appendChild(FuncSpace);

                const Func = document.createElement('div');
                Func.classList.add('Func');
                Func.classList.add(`Func${FuncId}`);
                Func.style.transition = `all 0.3s`;
                FuncSpace.appendChild(Func);

                CurFunc.datas.forEach(data => {
                    Func.style.backgroundColor = data.color;
                    Func.innerHTML = data.title;
                    Func.onclick = function () { addFuncToFunc(data.Func); };
                });
                if (FuncId == 16) {
                    FuncOpenDelay = 0;
                    CurFuncPage = 1;
                }
            }
        }

        function addFuncToFunc(Function) {
            const MenuFunc = document.querySelector('.MenuFunc');

            //expandMenuFunc();
            functions[Function]();

            /*setTimeout(() => {
                MenuFunc.style.transform = 'translateY(500%) translateX(-50%)';
                MenuFuncOpened = false;
                FuncExpanded = false;

            }, FuncDelay * 8);*/
        }

        function openMenuFunc() {
            const openMenuBTN = document.querySelector('.openMenuBTN');
            openMenuBTN.style.boxShadow = 'none';

            setTimeout(() => {
                openMenuBTN.style.boxShadow = 'black 4px 4px 4px';
            }, 250);
            const MenuFunc = document.querySelector('.MenuFunc');
            if (!AlreadyTurned) {
                if (!MenuFuncOpened) {
                    MenuFunc.style.transform = 'translateY(-50%) translateX(-50%)';
                    MenuFuncOpened = true;
                } else if (MenuFuncOpened) {
                    if (FuncExpanded) {
                        expandMenuFunc();
                        setTimeout(() => {
                            MenuFunc.style.transform = 'translateY(500%) translateX(-50%)';
                            MenuFuncOpened = false;
                            FuncExpanded = false;
                        }, FuncDelay * 8);
                    } else if (!FuncExpanded) {
                        MenuFunc.style.transform = 'translateY(500%) translateX(-50%)';
                        MenuFuncOpened = false;
                        FuncExpanded = false;
                    }
                }
            } else if (AlreadyTurned) {
                if (!MenuFuncOpened) {
                    MenuFunc.style.transform = 'translateX(-50%) translateY(-50%)';
                    MenuFuncOpened = true;
                } else if (MenuFuncOpened) {
                    if (FuncExpanded) {
                        expandMenuFunc();
                        setTimeout(() => {
                            MenuFunc.style.transform = 'translateX(500%) translateY(-50%)';
                            MenuFuncOpened = false;
                            FuncExpanded = false;
                        }, FuncDelay * 8);
                    } else if (!FuncExpanded) {
                        MenuFunc.style.transform = 'translateX(500%) translateY(-50%)';
                        MenuFuncOpened = false;
                        FuncExpanded = false;
                    }
                }
            }
        }

        function turnPower() {
            if (BTNCool == 0) {
                BTNCool = 6;
                const welcomeScreen = document.querySelector('.welcomeScreen');
                const welcomeText = document.querySelector('.WelcomeText');
                const welInText = document.querySelector('.WelInText');
                const LockScreen = document.querySelector('.LockScreen');
                const HomeScreen = document.querySelector('.HomeScreen');
                const ControlBar = document.querySelector('.ControlBar');
                const OpenedAppsList = document.querySelector('.AppList');
                const navbar = document.querySelector('.navbar');

                const powerBTN = document.querySelector('.powerBTNHit');

                powerBTN.style.transition = 'all 0.1s linear';
                powerBTN.style.transform = 'translateX(-5px)';
                setTimeout(() => {
                    powerBTN.style.transform = 'translateX(0)';
                }, 250);

                if (!power) {
                    welcomeScreen.style.display = 'flex';
                    setTimeout(() => {
                        welcomeText.style.width = '50%';
                        welcomeText.style.height = '30%';

                        setTimeout(() => {
                            welInText.style.opacity = '100%';

                            welcomeText.style.transform = 'rotate(180deg)';

                            setTimeout(() => {
                                welcomeScreen.style.display = 'none';
                                LockScreen.style.display = 'flex';
                                LockScreen.style.transition = 'all 0s';
                                LockScreen.style.transform = 'translateY(0%)';
                                LockScreen.style.transition = 'all 0.5s';

                                LockScreen.onclick = function() {UnlockPhone();};
                            }, 3000);
                        }, 2000);
                    }, 250);
                    power = true;
                } else if (power) {
                    setTimeout(() => {
                        welcomeScreen.style.display = 'flex';
                        LockScreen.style.display = 'none';
                        HomeScreen.style.display = 'none';
                        ControlBar.style.display = 'none';
                        navbar.style.display = 'none';
                        if (OpenedAppsList) {
                            OpenedAppsList.style.display = 'none';
                        }
                        

                        setTimeout(() => {
                            welInText.style.opacity = '0%';

                            welcomeText.style.transform = 'rotate(0deg)';

                            setTimeout(() => {
                                welcomeText.style.width = '0%';
                                welcomeText.style.height = '0%';

                                setTimeout(() => {
                                    welcomeScreen.style.display = 'none';
                                }, 2000);
                            }, 2000);
                        }, 250);
                    }, 250);
                    power = false;
                }
            }
        }

        function turnVolume(ChangeVolume) {
            const VolumeValue = document.querySelector('.VolumeValue');
            const VolumeBTN = document.querySelector(`.${ChangeVolume}BTNHit`);

                VolumeBTN.style.transition = 'all 0.1s linear';
                VolumeBTN.style.transform = 'translateX(5px)';
                setTimeout(() => {
                    VolumeBTN.style.transform = 'translateX(0)';
                }, 250);

                if (ChangeVolume == 'louder' && power && Volume <= 95) {
                    Volume += 5;
                } else if (ChangeVolume == 'quiet' && power && Volume >= 5) {
                    Volume -= 5;
                }
                VolumeValue.style.width = `${Volume}%`;
                showVolume();
        }

        function CreateVolumeBar() {
            const Screen = document.querySelector('.phoneScreen');
            const VolumeCont = document.createElement('div');
            VolumeCont.classList.add('VolumeCont');
            Screen.appendChild(VolumeCont);

            const Volume = document.createElement('div');
            Volume.classList.add('Volume');
            VolumeCont.appendChild(Volume);

            const VolumeValue = document.createElement('div');
            VolumeValue.classList.add('VolumeValue');
            Volume.appendChild(VolumeValue);
        }

        CreateVolumeBar();

        function showVolume() {
            if (power) {
                VolumeCool = 0.5;
                const Screen = document.querySelector('.phoneScreen');
                const VolumeCont = document.querySelector('.VolumeCont');

                VolumeCont.style.transition = 'all 0.5s';
                VolumeCont.style.transform = 'translateY(0) translateX(-50%)';
            }
        }

        function VolumeHide() {
            const VolumeCont = document.querySelector('.VolumeCont');

            if (VolumeCool > 0) {
                VolumeCool -= 0.01;
            }

            if (VolumeCool <= 0) {
                VolumeCont.style.transform = 'translateY(-200%) translateX(-50%)';
            }
        }
        setInterval(VolumeHide, 30);

        function Cooldown() {
            
            if (BTNCool > 0) {
                BTNCool -= 1;
            }
        }

        setInterval(Cooldown, 1000);

        function UnlockPhone() {
            const navbar = document.querySelector('.navbar');
            const ControlBar = document.querySelector('.ControlBar');
            const LockScreen = document.querySelector('.LockScreen');
            const HomeScreen = document.querySelector('.HomeScreen');

            navbar.style.display = 'flex';
            ControlBar.style.display = 'flex';
            HomeScreen.style.display = 'flex';
            LockScreen.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                LockScreen.style.display = 'none';
            }, 500);
        }

        function padZero(value) {
            return value < 10 ? '0' + value : value;
        }

        function PhoneTime() {
            const days = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
            const time = document.querySelectorAll('.PhoneTime');
            const date = document.querySelectorAll('.PhoneDate');

            const d_login = new Date();
            const year = d_login.getFullYear();

            let day_day = days[d_login.getDay()];
            const month = padZero(d_login.getMonth() + 1);
            const day = padZero(d_login.getDate());
            const hour = padZero(d_login.getHours());
            const minute = padZero(d_login.getMinutes());

            date.forEach(e => {
                e.innerHTML = `${day_day}  ${day}.${month}.${year}`;
            });
            time.forEach(e => {
                e.innerHTML = `${hour}:${minute}`;
            });
            
        }

        setInterval(PhoneTime, 30);
    </script>
